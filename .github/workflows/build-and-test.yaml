name: "Build and test"

on:
  push:
    branches: [ "tip-of-tree" ]
  pull_request:
    branches: [ "tip-of-tree" ]

permissions:
  contents: read

jobs:
  Windows:
    strategy:
      matrix:
        platform: [x86, x64]
        configuration: [Debug, Release]
        runner: [windows-2022] # TODO: Add windows-2019, which errors on Platform Toolset = 'v143' missing.
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Update NuGet packages
      run: nuget restore .\Projects\VisualStudio\png_cicp_editer.sln

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} .\Projects\VisualStudio\png_cicp_editer.sln

    - name: Test
      run: ${{ github.workspace }}\Projects\VisualStudio\tests\${{ matrix.platform }}\${{ matrix.configuration }}\tests.exe

  Linux:
    strategy:
      matrix:
        platform: [X86-64] # TODO: Add X86, AArch32, and AArch64 platforms
        compiler: [clang++-18, g++-14]
        runner: [ubuntu-24.04]
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install libc++-dev
      run: sudo apt install libc++-dev

    - name: Build
      env:
        CXX: ${{ matrix.compiler }}
      working-directory: ${{ github.workspace }}/Projects/Make
      run: make

    - name: Test
      run: ${{ github.workspace }}/Projects/Make/Build/tests

  MacOS:
    strategy:
      matrix:
        runner: [macos-15] # TODO: macos-15-arm64 was never assigned a runner from GitHub after 14 hours. Revisit later
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build
      working-directory: ${{ github.workspace }}/Projects/Make
      run: make

    - name: Test
      run: ${{ github.workspace }}/Projects/Make/Build/tests


